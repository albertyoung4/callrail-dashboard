<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebuilt — Call Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3345;
    --text: #e4e6ed;
    --text2: #8b90a0;
    --accent: #4f8cff;
    --accent2: #3b6fcc;
    --green: #34d399;
    --yellow: #fbbf24;
    --orange: #f97316;
    --red: #ef4444;
    --purple: #a78bfa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; font-size:14px; }

  /* Header */
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:100; }
  .header h1 { font-size:18px; font-weight:700; white-space:nowrap; }
  .header h1 span { color:var(--accent); }
  .search-box { flex:1; max-width:500px; position:relative; }
  .search-box input { width:100%; padding:10px 14px 10px 38px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border-color .2s; }
  .search-box input:focus { border-color:var(--accent); }
  .search-box svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text2); }
  .stats { color:var(--text2); font-size:13px; white-space:nowrap; }
  .stats b { color:var(--text); }
  .filter-bar { display:flex; align-items:center; gap:8px; padding:10px 18px; border-bottom:1px solid var(--border); background:var(--surface); flex-wrap:wrap; }
  .filter-btn { padding:5px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text2); cursor:pointer; font-size:12px; transition:all .15s; }
  .filter-btn:hover { border-color:var(--accent); color:var(--text); }
  .filter-btn.active { background:var(--accent2); border-color:var(--accent); color:#fff; }
  .filter-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .call-item .agent-name { color:var(--purple); font-size:12px; font-weight:500; }

  /* Main layout */
  .container { display:flex; height:calc(100vh - 57px); min-height:0; }
  .list-panel { width:420px; min-width:320px; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .detail-panel { flex:1; display:flex; overflow:hidden; min-height:0; }
  .detail-panel.empty { align-items:center; justify-content:center; }
  .empty-state { text-align:center; color:var(--text2); }
  .empty-state svg { margin-bottom:12px; opacity:.4; }
  .empty-state p { font-size:15px; }

  /* Call list */
  .call-list { flex:1; overflow-y:auto; }
  .call-item { padding:14px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
  .call-item:hover { background:var(--surface2); }
  .call-item.active { background:var(--surface2); border-left:3px solid var(--accent); padding-left:15px; }
  .call-item .name { font-weight:600; font-size:14px; margin-bottom:2px; }
  .call-item .phone { color:var(--accent); font-size:13px; font-family:'SF Mono',Monaco,monospace; }
  .call-item .meta { display:flex; gap:12px; margin-top:6px; color:var(--text2); font-size:12px; }
  .call-item .meta .duration { color:var(--green); }
  .call-item .meta .source { max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .call-item .lead-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; font-weight:600; margin-left:8px; }
  .call-item .outcome-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; margin-top:6px; }

  /* Pagination */
  .pagination { display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; border-top:1px solid var(--border); background:var(--surface); }
  .pagination button { padding:6px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); cursor:pointer; font-size:13px; }
  .pagination button:hover:not(:disabled) { background:var(--accent2); border-color:var(--accent); }
  .pagination button:disabled { opacity:.3; cursor:default; }
  .pagination span { color:var(--text2); font-size:13px; }

  /* Detail panels */
  .transcript-panel, .analysis-panel { flex:1; overflow-y:auto; padding:24px; min-height:0; height:100%; }
  .transcript-panel { border-right:1px solid var(--border); }

  .detail-header { margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .detail-header h2 { font-size:18px; margin-bottom:4px; }
  .detail-header .detail-meta { display:flex; flex-wrap:wrap; gap:16px; color:var(--text2); font-size:13px; margin-top:8px; }
  .detail-header .detail-meta span { display:flex; align-items:center; gap:4px; }

  /* Transcript */
  .transcript-line { margin-bottom:12px; line-height:1.6; }
  .transcript-line .speaker { font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
  .transcript-line .speaker.agent { color:var(--accent); }
  .transcript-line .speaker.caller { color:var(--green); }
  .transcript-line .text { color:var(--text); padding-left:12px; border-left:2px solid var(--border); }

  /* Analysis */
  .grade-ring { width:100px; height:100px; margin:0 auto 20px; position:relative; }
  .grade-ring svg { transform:rotate(-90deg); }
  .grade-ring .grade-label { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:32px; font-weight:800; }
  .grade-ring .grade-score { position:absolute; bottom:-4px; left:50%; transform:translateX(-50%); font-size:12px; color:var(--text2); }

  .analysis-section { margin-bottom:20px; }
  .analysis-section h3 { font-size:14px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .analysis-section h3 .score-pill { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }

  .feedback-item { padding:8px 12px; margin-bottom:6px; border-radius:6px; font-size:13px; line-height:1.5; }
  .feedback-item.positive { background:rgba(52,211,153,.08); border-left:3px solid var(--green); color:var(--green); }
  .feedback-item.negative { background:rgba(239,68,68,.08); border-left:3px solid var(--red); color:var(--red); }
  .feedback-item.warning { background:rgba(251,191,36,.08); border-left:3px solid var(--yellow); color:var(--yellow); }

  .analysis-tabs { display:flex; gap:0; margin-bottom:16px; border-bottom:2px solid var(--border); }
  .analysis-tab { padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; border:none; background:none; color:var(--text2); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; }
  .analysis-tab:hover { color:var(--text); }
  .analysis-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  .summary-grid { display:flex; flex-direction:column; gap:10px; }
  .summary-row { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:8px; background:var(--surface2); }
  .summary-row .cat-name { flex:1; font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .summary-row .cat-bar-wrap { flex:0 0 100px; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
  .summary-row .cat-bar { height:100%; border-radius:4px; transition:width .3s; }
  .summary-row .cat-score { font-size:12px; font-weight:700; min-width:44px; text-align:right; }
  .summary-row .cat-grade { font-size:13px; font-weight:800; min-width:24px; text-align:center; }

  .summary-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:20px; font-size:13px; line-height:1.6; color:var(--text2); }

  /* Scrollbar */
  * { scrollbar-width:thin; scrollbar-color:var(--text2) transparent; }
  ::-webkit-scrollbar { width:8px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--text2); border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--accent); }

  /* Loading */
  .loading { display:flex; align-items:center; justify-content:center; height:100%; color:var(--text2); }
  .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; margin-right:12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media (max-width:900px) {
    .list-panel { width:100%; }
    .container { flex-direction:column; }
    .detail-panel { flex-direction:column; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Rebuilt <span>Call Dashboard</span></h1>
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search by name, phone, or agent...">
  </div>
  <div class="stats" id="stats"></div>
</div>

<div class="container">
  <div class="list-panel">
    <div class="filter-bar">
      <span class="filter-label">Duration:</span>
      <button class="filter-btn" data-min="0" onclick="setDurationFilter(0)">All</button>
      <button class="filter-btn active" data-min="120" onclick="setDurationFilter(120)">2m+</button>
      <button class="filter-btn" data-min="300" onclick="setDurationFilter(300)">5m+</button>
      <button class="filter-btn" data-min="600" onclick="setDurationFilter(600)">10m+</button>
    </div>
    <div class="call-list" id="callList">
      <div class="loading"><div class="spinner"></div>Loading calls...</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
  <div class="detail-panel empty" id="detailPanel">
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15.05 5A5 5 0 0119 8.95M15.05 1A9 9 0 0123 8.94M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      <p>Select a call to view transcript & analysis</p>
    </div>
  </div>
</div>

<script>
const PER_PAGE = 25;
let allCalls = [];
let filteredCalls = [];
let currentPage = 1;
let selectedCallId = null;
let minDuration = 120;

function extractAgentName(call) {
  // Prefer Five9 agent_name, fall back to transcript extraction
  if (call.agent_name) return call.agent_name;
  if (!call.transcript) return '';
  const m = call.transcript.match(/(?:this is|my name is|i'm|i am)\s+([A-Z][a-z]+)/i);
  if (m && !['Business','Thank','This','Your','An'].includes(m[1])) return m[1];
  return '';
}

async function init() {
  try {
    const res = await fetch('calls.json');
    const data = await res.json();
    allCalls = data.calls.map(c => ({ ...c, agent_name: extractAgentName(c) }));
    applyFilters();
  } catch (e) {
    document.getElementById('callList').innerHTML = '<div class="loading" style="color:var(--red)">Failed to load calls.json — run: node fetch-calls.js</div>';
  }
}

function setDurationFilter(min) {
  minDuration = min;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.min) === min));
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().replace(/[\s\-\(\)]/g,'');
  filteredCalls = allCalls.filter(c => {
    if (c.duration < minDuration) return false;
    if (!q) return true;
    const name = (c.customer_name||'').toLowerCase();
    const phone = (c.customer_phone||'').replace(/\D/g,'');
    const agent = (c.agent_name||'').toLowerCase();
    return name.includes(q) || phone.includes(q) || agent.includes(q);
  });
  currentPage = 1;
  updateStats();
  renderList();
  renderPagination();
}

function updateStats() {
  document.getElementById('stats').innerHTML = `Showing <b>${filteredCalls.length}</b> of <b>${allCalls.length}</b> calls with transcripts`;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + ' ' +
         d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}

function formatPhone(p) {
  if (!p) return '';
  const n = p.replace(/\D/g,'').slice(-10);
  return `(${n.slice(0,3)}) ${n.slice(3,6)}-${n.slice(6)}`;
}

function formatDuration(s) {
  if (s < 60) return `${s}s`;
  const m = Math.floor(s/60), sec = s%60;
  return sec ? `${m}m ${sec}s` : `${m}m`;
}

function leadColor(score) {
  if (!score) return '';
  const s = parseInt(score);
  if (s >= 70) return 'var(--green)';
  if (s >= 40) return 'var(--yellow)';
  return 'var(--red)';
}

// Search
document.getElementById('searchInput').addEventListener('input', () => applyFilters());

function classifyOutcome(c) {
  const t = (c.transcript || '').toLowerCase();
  const summary = (c.call_summary || '').toLowerCase();
  const all = t + ' ' + summary;
  const dur = c.duration || 0;
  const five9 = (c.five9_disposition || '').toLowerCase();

  // Use Five9 disposition when available — source of truth
  if (five9) {
    if (/do not c|dnc|do not contact/.test(five9)) return { label:'Do Not Contact', color:'var(--red)', bg:'rgba(239,68,68,.12)' };
    if (/appointment set/.test(five9)) return { label:'Appointment Set', color:'var(--green)', bg:'rgba(52,211,153,.12)' };
    if (/opportunity/.test(five9)) return { label:'Opportunity', color:'var(--accent)', bg:'rgba(79,140,255,.12)' };
    if (/not selling/.test(five9)) return { label:'Not Selling', color:'var(--red)', bg:'rgba(239,68,68,.12)' };
    if (/wrong number/.test(five9)) return { label:'Wrong Number', color:'var(--orange)', bg:'rgba(249,115,22,.12)' };
    if (/marketplace/.test(five9)) return { label:'Marketplace', color:'var(--purple)', bg:'rgba(167,139,250,.12)' };
    if (/follow.up|callback/.test(five9)) return { label:'Follow Up', color:'var(--yellow)', bg:'rgba(251,191,36,.12)' };
    if (/active listing/.test(five9)) return { label:'Active Listing', color:'var(--orange)', bg:'rgba(249,115,22,.12)' };
    if (/no disposition/.test(five9)) { /* fall through to transcript analysis */ }
    else if (/caller disconnect|answering machine|no answer/.test(five9)) { /* fall through */ }
    else if (five9.trim()) return { label: five9.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' '), color:'var(--text2)', bg:'rgba(139,144,160,.12)' };
  }

  // Do Not Contact / Remove — require strong signals, not just keyword mentions
  if (/do not (call|contact)|stop (calling|sending|mailing)|remove (me|my|us|this).*(list|mail)|take me off|don'?t (ever )?(call|send|mail)|unsubscribe|harassment|sue you|reported you|blocking (you|this|your)/.test(all))
    return { label:'Do Not Contact', color:'var(--red)', bg:'rgba(239,68,68,.12)' };

  // Wrong Number
  if (/wrong (number|person|house|address)|don'?t own|not my (house|property|home)|never owned|no longer own|sold (it|that|the)/.test(all))
    return { label:'Wrong Number', color:'var(--orange)', bg:'rgba(249,115,22,.12)' };

  // Voicemail / No Answer
  if (dur <= 15 || /voicemail|leave a message|no one.*available|mailbox/.test(all))
    return { label:'Voicemail', color:'var(--text2)', bg:'rgba(139,144,160,.12)' };

  // Call Dropped
  if (/can you hear me|hello\?.*hello\?|dropped|disconnected|lost.*connection/.test(t) && dur < 120)
    return { label:'Call Dropped', color:'var(--orange)', bg:'rgba(249,115,22,.12)' };

  // Contract Sent
  if (/contract|agreement|sign|docusign|pandadoc|send.*(over|you).*(paperwork|contract|agreement)|under contract|put.*on.*contract/.test(all))
    return { label:'Contract Sent', color:'var(--green)', bg:'rgba(52,211,153,.12)' };

  // Offer Made
  if (/offer.*(of|is|at|around|about)\s*\$?\d|we.*(offer|do|go|come in at)\s*\$?\d|\d+\s*(grand|thousand|k)\b.*offer|probably.*about.*\d+(,\d+)?/.test(t) && dur > 120)
    return { label:'Offer Made', color:'var(--accent)', bg:'rgba(79,140,255,.12)' };

  // Follow Up Call
  if (/follow.?up|call.*(back|again|monday|tuesday|wednesday|thursday|friday|saturday|sunday|tomorrow|next week)|reach out.*(to you|on|later)|schedule|set.*time|talk.*(monday|tuesday|wednesday|thursday|friday|saturday|sunday|tomorrow|later)|send.*(text|info|pictures|photos)/.test(all))
    return { label:'Follow Up', color:'var(--yellow)', bg:'rgba(251,191,36,.12)' };

  // Not Interested
  if (/not interested|no thank|don'?t think so|not (right now|at this time|looking|selling)|too low|that'?s (too|way too) low|insulting|decline|rejected|not worth|pass on|no way/.test(all))
    return { label:'Not Interested', color:'var(--red)', bg:'rgba(239,68,68,.12)' };

  // Qualified Lead (long call, engaged)
  if (dur > 300)
    return { label:'Qualified Lead', color:'var(--purple)', bg:'rgba(167,139,250,.12)' };

  // Info Gathered
  if (dur > 60)
    return { label:'Info Gathered', color:'var(--text2)', bg:'rgba(139,144,160,.12)' };

  return { label:'Short Call', color:'var(--text2)', bg:'rgba(139,144,160,.12)' };
}

function renderList() {
  const start = (currentPage-1)*PER_PAGE;
  const page = filteredCalls.slice(start, start+PER_PAGE);
  const list = document.getElementById('callList');

  if (page.length === 0) {
    list.innerHTML = '<div class="loading">No calls found</div>';
    return;
  }

  list.innerHTML = page.map(c => {
    const outcome = classifyOutcome(c);
    return `
    <div class="call-item ${c.id === selectedCallId ? 'active' : ''}" data-id="${c.id}">
      <div class="name">${c.customer_name || 'Unknown'}
        ${c.lead_score ? `<span class="lead-badge" style="background:${leadColor(c.lead_score)}22;color:${leadColor(c.lead_score)}">${c.lead_score}</span>` : ''}
      </div>
      <div class="phone">${formatPhone(c.customer_phone)}${c.agent_name ? ` <span class="agent-name">— ${c.agent_name}</span>` : ''}</div>
      <div class="meta">
        <span>${formatDate(c.start_time)}</span>
        <span class="duration">${formatDuration(c.duration)}</span>
        <span class="source" title="${c.source||''}">${(c.source||'').split(' - ').slice(-2).join(' - ')}</span>
      </div>
      <div><span class="outcome-badge" style="background:${outcome.bg};color:${outcome.color}">${outcome.label}</span></div>
    </div>
  `;}).join('');

  list.querySelectorAll('.call-item').forEach(el => {
    el.addEventListener('click', () => selectCall(el.dataset.id));
  });
}

function renderPagination() {
  const totalPages = Math.ceil(filteredCalls.length / PER_PAGE);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  pag.innerHTML = `
    <button ${currentPage<=1?'disabled':''} onclick="goPage(${currentPage-1})">Prev</button>
    <span>Page ${currentPage} of ${totalPages}</span>
    <button ${currentPage>=totalPages?'disabled':''} onclick="goPage(${currentPage+1})">Next</button>
  `;
}

function goPage(p) {
  currentPage = p;
  renderList();
  renderPagination();
  document.getElementById('callList').scrollTop = 0;
}

function selectCall(id) {
  selectedCallId = id;
  const call = allCalls.find(c => c.id === id);
  if (!call) return;
  renderList();
  renderDetail(call);
}

function parseTranscript(raw) {
  const lines = [];
  const regex = /(Agent|Caller):\s*/gi;
  let match, lastIdx = 0, lastSpeaker = null;
  const text = raw.replace(/\n/g,' ');
  while ((match = regex.exec(text)) !== null) {
    if (lastSpeaker !== null) {
      lines.push({ speaker: lastSpeaker, text: text.slice(lastIdx, match.index).trim() });
    }
    lastSpeaker = match[1];
    lastIdx = match.index + match[0].length;
  }
  if (lastSpeaker) lines.push({ speaker: lastSpeaker, text: text.slice(lastIdx).trim() });
  return lines;
}

function analyzeCall(call) {
  const t = (call.transcript || '').toLowerCase();
  const lines = parseTranscript(call.transcript || '');
  const agentLines = lines.filter(l => l.speaker.toLowerCase() === 'agent');
  const callerLines = lines.filter(l => l.speaker.toLowerCase() === 'caller');
  const agentText = agentLines.map(l => l.text).join(' ').toLowerCase();
  const callerText = callerLines.map(l => l.text).join(' ').toLowerCase();
  const allText = agentText + ' ' + callerText;

  const categories = [];

  // ============================================================
  // REBUILT CALL SCRIPT RUBRIC — 13-Step Virtual Appointment Flow
  // Based on "Direct Answer: Virtual Appointment Call Script"
  // ============================================================

  // 1. OPENING: INTRO & AGENDA (Steps 1-2) — 10 pts
  let opening = { name:'Step 1-2: Opening & Agenda', max:10, score:0, good:[], bad:[] };
  // Company ID
  if (/rebuilt/i.test(agentLines[0]?.text || '')) { opening.score += 1; opening.good.push('Correctly identified as Rebuilt'); }
  else if (/reboot|rebilt|breedville/i.test(agentLines[0]?.text || '')) { opening.bad.push('Mispronounced company name'); }
  // Name confirmation
  if (/your name|first name|who am i speaking|what.*name|call you/.test(agentText)) { opening.score += 1; opening.good.push('Asked for caller\'s name'); }
  // Offer code
  if (/offer code|mailer code|code/.test(agentText)) { opening.score += 1; opening.good.push('Asked for offer/mailer code'); }
  // Agenda setting: "Most people want to know what we do, how we do it..."
  if (/15.*20 minutes|how long.*take|my job is to|learn about your situation|see if.*qualifies|give it our best shot|sound fair/.test(agentText)) {
    opening.score += 3; opening.good.push('Set agenda — explained call purpose and timeline');
  } else if (/by the end|end of (this |the )?call|whether this makes sense/.test(agentText)) {
    opening.score += 2; opening.good.push('Used outcome framing (partial agenda set)');
  } else if (call.duration > 300) { opening.bad.push('No agenda set — should explain: "This call will take 15-20 min, my job is to learn about your situation and see if your property qualifies"'); }
  // Decision-maker check
  if (/decision.?maker|anyone else.*(consult|involved|need to talk)|spouse|partner|wife|husband|add them|both.*on/.test(agentText)) {
    opening.score += 3; opening.good.push('Confirmed decision-makers — "Is there anyone else you\'d need to consult?"');
  } else if (call.duration > 300) { opening.bad.push('Never checked for other decision-makers — risk of "I need to talk to my spouse" stall'); }
  // Address confirmation
  if (/confirm.*address|address.*correct|that.*address|verify.*address/.test(agentText)) { opening.score += 1; opening.good.push('Re-confirmed property address'); }
  categories.push(opening);

  // 2. FACT FINDING: OWNERSHIP (Step 3 / Pillar 1) — 10 pts
  let ownership = { name:'Step 3: Ownership & Fact Finding', max:10, score:0, good:[], bad:[] };
  // Ownership verification
  if (/show.*as.*owner|owner.*on.*deed|deed.*owner|who.*(own|on the deed)|name.*on.*deed|owned it for/.test(agentText)) {
    ownership.score += 3; ownership.good.push('Verified ownership — "I show X as owners on the deed, is that correct?"');
  } else if (/own|owner/.test(agentText)) { ownership.score += 1; ownership.good.push('Touched on ownership but didn\'t verify deed names'); }
  else if (call.duration > 300) { ownership.bad.push('Never verified deed ownership — critical first pillar'); }
  // How acquired
  if (/buy.*directly|auction|tax sale|inherit|how.*(acquire|get|come to own)/.test(agentText)) {
    ownership.score += 2; ownership.good.push('Asked how property was acquired (direct purchase, auction, tax sale, inheritance)');
  }
  // Probate handling
  if (/probate|estate|inherit|passed away|deceased|heir/.test(allText)) {
    if (/probate/.test(agentText)) { ownership.score += 2; ownership.good.push('Asked about probate status on inherited property'); }
    else { ownership.bad.push('Inherited property detected — must ask "Has the estate been through probate yet?"'); }
  } else { ownership.score += 2; }
  // Occupancy type
  if (/primary residence|investment|vacant|occupied|living there|tenant|rental/.test(agentText)) {
    ownership.score += 2; ownership.good.push('Confirmed occupancy type (primary, investment, vacant)');
  } else if (call.duration > 300) { ownership.bad.push('Didn\'t confirm occupancy type — primary residence vs investment vs vacant'); }
  // Red flag escalation
  if (/llc|trust|entity|divorce|lien|bankrupt|foreclos|poa|power of attorney/.test(allText)) {
    if (/manager|market manager|escalat|let me check|flag|talk to my/.test(agentText)) { ownership.score += 1; ownership.good.push('Flagged title complication for escalation'); }
    else { ownership.bad.push('Title red flag detected — must escalate to Market Manager per training'); }
  } else { ownership.score += 1; }
  categories.push(ownership);

  // 3. DISCOVERY: MOTIVATION & STORY (Step 4) — 20 pts
  let discovery = { name:'Step 4: Discovery & Motivation', max:20, score:0, good:[], bad:[] };

  // Problem Questions — "What's got you considering selling now?"
  if (/what.*(got you|made you|driving|considering|thinking about)|why.*(sell|move|let.*go|considering)|other than.*mailer/.test(agentText)) {
    discovery.score += 5; discovery.good.push('Asked Problem Question — "What\'s got you considering selling now?"');
  } else if (/sell|interested|looking to|definitely selling|got to go|too old|can\'t manage/.test(callerText)) {
    discovery.score += 1; discovery.bad.push('Seller volunteered motivation but agent didn\'t ask a Problem Question — "Other than receiving our mailer, what\'s got you considering selling?"');
  } else if (call.duration > 180) { discovery.bad.push('Never asked a Problem Question — #1 priority per script'); }

  // Impact Questions — "When you say X, what do you mean? How long has that been on your mind?"
  if (/when you say|what do you mean|how long has that|is that a big deal|really\?|tell me more/.test(agentText)) {
    discovery.score += 4; discovery.good.push('Used Impact Questions — dug deeper into seller\'s pain');
  } else if (call.duration > 300) { discovery.bad.push('No Impact Questions — should probe: "When you say that, what do you mean? How long has that been on your mind?"'); }

  // Picture Perfect Questions — "If you could wave a magic wand..."
  if (/magic wand|paint.*picture|where would you go|what would you do|what.*roadblock|what.*prevent/.test(agentText)) {
    discovery.score += 3; discovery.good.push('Used Picture Perfect Questions — "If you could wave a magic wand, what would that look like?"');
  }

  // Emotional mirroring
  if (/sorry|condolence|understand|that.*(tough|hard|difficult|stressful)|i (can )?(imagine|appreciate)|if i were in your shoes/.test(agentText) && /(passed|died|sick|medical|divorce|lost|injury|hardship|struggle|stress|frustrat|tired|exhaust)/.test(callerText)) {
    discovery.score += 3; discovery.good.push('Mirrored seller emotion with empathy');
  } else if (/(passed|died|sick|medical|divorce|lost|injury|hardship|struggle)/.test(callerText)) {
    discovery.bad.push('Seller shared emotional situation — agent should mirror: "If I were in your shoes, I\'d probably feel the same way"');
  } else { discovery.score += 1; }

  // Timeline
  if (/timeline|when.*(close|move|sell|need|like to|hoping)|how soon|deadline|by when|end of|another place lined up/.test(agentText)) {
    discovery.score += 3; discovery.good.push('Established timeline and urgency');
  } else if (call.duration > 300) { discovery.bad.push('Never established timeline — ask "If you did sell, do you have another place lined up?"'); }

  // Financial / mortgage (bridge from condition section)
  if (/mortgage|owe|payoff|pay off|paid off|lien|tax|balance|what.*owe|assume.*paid off/.test(agentText)) {
    discovery.score += 2; discovery.good.push('Asked about mortgage/financial situation');
  } else if (/owe|mortgage|behind|balance/.test(callerText)) {
    discovery.score += 1; discovery.bad.push('Seller mentioned financials — agent should probe further');
  } else if (call.duration > 300) { discovery.bad.push('Didn\'t ask about mortgage — use bridge: "I assume you already have this home paid off, right?"'); }
  categories.push(discovery);

  // 4. CONDITION DIAGNOSTIC (Step 5 / Pillar 3) — 15 pts
  let condition = { name:'Step 5: Condition & Due Diligence', max:15, score:0, good:[], bad:[] };
  // A-F grade question
  if (/grade|score|scale|a (being|to|through) f|a being.*list|f being.*teardown/.test(agentText)) {
    condition.score += 3; condition.good.push('Used A-F grade question — "On a scale of A being ready to list and F being a teardown..."');
  }
  // "What kept you from giving it an A?"
  if (/what kept|what would make it|why not an? a|what.*prevent.*a\b/.test(agentText)) {
    condition.score += 2; condition.good.push('Followed up with "What kept you from giving it an A?"');
  }
  // Condition checklist
  let ddItems = 0;
  if (/roof/.test(agentText)) ddItems++;
  if (/hvac|heat|ac\b|air condition|furnace|heat pump/.test(agentText)) ddItems++;
  if (/water heater|hot water/.test(agentText)) ddItems++;
  if (/plumbing|pipe|cast iron|pvc|pex|copper/.test(agentText)) ddItems++;
  if (/electric|breaker|fuse|panel|wiring/.test(agentText)) ddItems++;
  if (/foundation|slab|crawl|basement/.test(agentText)) ddItems++;
  if (ddItems >= 5) { condition.score += 6; condition.good.push(`Excellent: covered ${ddItems}/6 condition checklist items`); }
  else if (ddItems >= 3) { condition.score += 4; condition.good.push(`Covered ${ddItems}/6 condition items — aim for all 6 (roof, HVAC, water heater, plumbing, electrical, foundation)`); }
  else if (ddItems >= 1) { condition.score += 2; condition.good.push(`Only ${ddItems}/6 condition items covered`); }
  else if (call.duration > 300) { condition.bad.push('No condition checklist — must walk through: roof, HVAC, water heater, plumbing, electrical, foundation'); }
  // Updates in last 3-5 years
  if (/update|remodel|renovation|kitchen|bathroom|flooring|recent.*(work|improvement)/.test(agentText)) {
    condition.score += 2; condition.good.push('Asked about recent updates (kitchen, bathrooms, flooring)');
  }
  // DD normalization language
  if (/finance team|underwriting|double.check|every (home|property|house)|we do this on every|surprise (either|us|you)/.test(agentText)) {
    condition.score += 2; condition.good.push('Normalized DD — "so our underwriting team doesn\'t come back and surprise either of us"');
  }
  categories.push(condition);

  // 5. RECAP & CREDIBILITY (Steps 6-7) — 5 pts
  let recap = { name:'Steps 6-7: Recap & Credibility', max:5, score:0, good:[], bad:[] };
  if (/recap|let me.*confirm|just to confirm|so.*dealing with|sound right|sound about right|did.*sound.*right/.test(agentText)) {
    recap.score += 2; recap.good.push('Recapped seller\'s situation — showed active listening');
  } else if (call.duration > 600) { recap.bad.push('No recap before offer — should summarize: "So just to confirm — you\'re dealing with [pain], hoping to [goal]"'); }
  if (/since 2018|thousands of homes|nationwide|largest|80 properties|every month|no fees|no commission|as.is/.test(agentText)) {
    recap.score += 2; recap.good.push('Built credibility — shared Rebuilt\'s track record');
  }
  if (/have you considered listing|thought about.*agent|realtor|listing/.test(agentText)) {
    recap.score += 1; recap.good.push('Addressed listing alternative proactively');
  }
  categories.push(recap);

  // 6. PRICING & NEGOTIATION (Steps 8-9 / Pillar 4) — 25 pts
  let pricing = { name:'Steps 8-9: Pricing & Negotiation', max:25, score:0, good:[], bad:[] };

  const agentPriceIdx = agentText.search(/\d{2,3}(,\d{3})|\d+\s*(grand|thousand|k)\b/);

  // Comp-based anchor: "Would it surprise you to know that cash sales for properties like yours..."
  if (/would it surprise|surprise you|cash sales|properties like yours.*sold|comp|comparable|similar.*(homes|properties).*sold/.test(agentText)) {
    pricing.score += 6; pricing.good.push('Used comp anchor — "Would it surprise you to know that cash sales for properties like yours sold between..."');
  } else if (/sold (between|for|around|at)/.test(agentText)) {
    pricing.score += 3; pricing.good.push('Referenced market data but didn\'t use full anchor script');
  } else if (agentPriceIdx > -1 && call.duration > 300) {
    pricing.bad.push('Gave price without comp anchor — should frame: "Would it surprise you to know that cash sales sold between $XX and $YY?"');
  }

  // Finance Team hold technique: actual 60-second hold
  if (/finance.*(team|manager)|check with|get.*approv|was able to get them|speak with|spoke with|run this by|wish me luck|put you on.*hold|brief hold/.test(agentText)) {
    pricing.score += 5; pricing.good.push('Used Finance Team hold technique — builds authority and creates real pause');
  } else if (agentPriceIdx > -1 && call.duration > 300) {
    pricing.bad.push('Should use "Let me run this by my Finance Team" with an actual 60-second hold before presenting offer');
  }

  // "Grab a pen" technique
  if (/grab a pen|write this down|pen and paper|got a pen/.test(agentText)) {
    pricing.score += 2; pricing.good.push('Used "grab a pen" — "People see numbers, they don\'t hear them"');
  }

  // Odd/specific numbers ($64,355 not $64,000)
  if (/\$\d{2,3},\d{3}(?!,000\b)|\d{2,3},\d{2}[1-9]/.test(agentText)) {
    pricing.score += 2; pricing.good.push('Used specific/odd offer number — builds finality and credibility');
  }

  // Good-faith framing: "This number is a good-faith offer based on what you told me"
  if (/good.faith|based on what you.*(told|shared)|contingent.*condition|verify.*condition|once we verify/.test(agentText)) {
    pricing.score += 2; pricing.good.push('Framed offer as good-faith estimate contingent on verification');
  }

  // Give-to-Get negotiation: "If I can get them to come up, would you be able to..."
  if (/if i (can|could) get.*(come up|move|closer|approve)|would you be able to|clean.*out|make a decision today|have.*fixed/.test(agentText)) {
    pricing.score += 3; pricing.good.push('Used Give-to-Get — traded value for value in negotiation');
  }

  // Didn't negotiate against self
  if (/flexibility|how did you come up with|where.*you.*getting|what.*based on/.test(agentText)) {
    pricing.score += 2; pricing.good.push('Didn\'t negotiate against self — asked seller to justify their number');
  }

  // Checked seller reaction
  if (/work.*for you|does that.*work|how.*feel|how.*sound|what.*think|would that work/.test(agentText)) {
    pricing.score += 2; pricing.good.push('Checked seller\'s reaction to offer');
  } else if (agentPriceIdx > -1) {
    pricing.bad.push('Gave offer without checking seller reaction — seller must feel they won');
  }

  // "Too close not to do business" close
  if (/too close|not to do business|we.re (so )?close/.test(agentText)) {
    pricing.score += 1; pricing.good.push('Used "We\'re too close not to do business together" close');
  }
  categories.push(pricing);

  // 7. OBJECTION HANDLING (Step 10) — 10 pts
  let objections = { name:'Step 10: Objection Handling', max:10, score:0, good:[], bad:[] };
  const sellerObjected = /(not interested|too low|need to think|think about it|talk to|let me think|not sure|way too low|that.*low|i('d| would) need more|can't do that)/.test(callerText);
  if (sellerObjected) {
    // Step 1: Acknowledge
    if (/understand|totally understand|big decision|no worries|not.*rush/.test(agentText)) {
      objections.score += 2; objections.good.push('Step 1: Acknowledged — "I totally understand, it\'s a big decision"');
    } else { objections.bad.push('Missing Step 1: Acknowledge — "I totally understand, it\'s a big decision"'); }
    // Step 2: Clarify
    if (/mainly the number|the timing|something else|holding you back|which.*closest|one of three things|what specifically/.test(agentText)) {
      objections.score += 2; objections.good.push('Step 2: Clarified real objection — "Is it the number, timing, or something else?"');
    } else { objections.bad.push('Missing Step 2: Clarify — "Is it mainly the number, the timing, or something else holding you back?"'); }
    // Step 3: Mirror
    if (/if i were in your shoes|makes sense|feel the same/.test(agentText)) {
      objections.score += 1; objections.good.push('Step 3: Mirrored — "If I were in your shoes, I\'d feel the same way"');
    }
    // Step 4: Re-anchor to motivation
    if (/earlier you mentioned|you (said|mentioned|told me)|has anything changed|still.*want/.test(agentText)) {
      objections.score += 2; objections.good.push('Step 4: Re-anchored to seller\'s original motivation');
    } else { objections.bad.push('Missing Step 4: Re-anchor — "Earlier you mentioned [pain]. Has anything changed there?"'); }
    // Step 5: Conditional flexibility
    if (/if i could get.*move|adjust.*closing|closer to what you|fit your timeline/.test(agentText)) {
      objections.score += 1; objections.good.push('Step 5: Offered conditional flexibility');
    }
    // Step 6: Close the loop
    if (/valid for|in writing|72 hours|lock.*in|send.*offer/.test(agentText)) {
      objections.score += 1; objections.good.push('Step 6: Closed the loop — sent offer in writing or set deadline');
    }
    // Step 7: Value reframe
    if (/listing|repairs|showings|commissions|months of uncertainty|convenience.*speed|time.*stress.*risk/.test(agentText)) {
      objections.score += 1; objections.good.push('Step 7: Reframed value — listing vs. speed/convenience/certainty');
    }
  } else {
    // No objection — give partial credit
    objections.score += 5;
  }
  categories.push(objections);

  // 8. CLOSE & NEXT STEPS (Steps 11-13) — 10 pts
  let close = { name:'Steps 11-13: Close & Next Steps', max:10, score:0, good:[], bad:[] };
  // Contract sent / reviewed
  if (/contract|agreement|paperwork|docusign|pandadoc|sign|review.*agreement|walk.*through|email.*agreement|send.*agreement/.test(agentText)) {
    close.score += 3; close.good.push('Moved to contract — sent or reviewed agreement');
  }
  // Email collected for agreement
  if (/email.*address|best email|send.*email|what.*email/.test(agentText)) {
    close.score += 1; close.good.push('Collected email for agreement delivery');
  }
  // Photos / photographer scheduled
  if (/photo|picture|photographer|walkthrough|schedule.*(come out|visit|rep)|send.*rep|local.*rep/.test(agentText)) {
    close.score += 2; close.good.push('Set up photos or photographer visit');
  } else if (call.duration > 600) { close.bad.push('No photos/photographer scheduled — must verify condition before closing'); }
  // Next steps outlined
  if (/next step|here.s what happens|process.*from here|underwriter|title|closing date|wired|signing/.test(agentText)) {
    close.score += 2; close.good.push('Outlined next steps in the process');
  }
  // Follow-up set
  if (/follow.?up|call.*(back|you)|reach out|talk.*(monday|tuesday|wednesday|thursday|friday|saturday|sunday|tomorrow|next week|later today|this evening)/.test(agentText)) {
    close.score += 1; close.good.push('Set specific follow-up time');
  } else if (call.duration > 300 && !/contract|agreement/.test(agentText)) {
    close.bad.push('No follow-up scheduled and no contract sent — always close with next steps');
  }
  // Contact info shared
  if (/my (direct|number|contact|cell)|text.*info|write down my|contact info/.test(agentText)) {
    close.score += 1; close.good.push('Shared direct contact info with seller');
  }
  categories.push(close);

  // 9. CALL CONTROL & TONE — 5 pts
  let control = { name:'Tone & Call Control', max:5, score:0, good:[], bad:[] };
  const agentWordCount = agentText.split(/\s+/).length;
  const callerWordCount = callerText.split(/\s+/).length;
  const listenRatio = callerWordCount / (agentWordCount + callerWordCount + 1);
  if (listenRatio > 0.30) { control.score += 2; control.good.push(`Good listen ratio (${Math.round(listenRatio*100)}% seller talk) — diagnostic approach`); }
  else if (listenRatio < 0.15 && call.duration > 180) { control.bad.push(`Agent dominated conversation (${Math.round((1-listenRatio)*100)}% agent talk) — listen more, diagnose, don't pitch`); }
  else { control.score += 1; }
  const fillers = (agentText.match(/\b(um|uh|oh geez|oh gee|like,|you know,|honestly|basically)\b/g) || []).length;
  if (fillers <= 2) { control.score += 1; control.good.push('Clean delivery — minimal filler words'); }
  else { control.bad.push(`${fillers} filler words — undermines confident, professional tone`); }
  if (/messed up|not working|system.*down|can't find|not popping|broken|glitch/.test(agentText)) {
    control.bad.push('Exposed internal system issues to seller');
  } else { control.score += 1; }
  if (call.duration >= 180 && call.duration <= 1500) { control.score += 1; }
  else if (call.duration < 120) { control.bad.push('Call too short for full 13-step process'); }
  categories.push(control);

  // ============================================================
  // SCORING
  // ============================================================
  const totalScore = categories.reduce((s,c) => s + c.score, 0);
  const totalMax = categories.reduce((s,c) => s + c.max, 0);
  const pct = Math.round((totalScore / totalMax) * 100);

  let grade, gradeColor;
  if (pct >= 90) { grade='A'; gradeColor='var(--green)'; }
  else if (pct >= 80) { grade='B+'; gradeColor='var(--green)'; }
  else if (pct >= 70) { grade='B'; gradeColor='var(--yellow)'; }
  else if (pct >= 60) { grade='B-'; gradeColor='var(--yellow)'; }
  else if (pct >= 50) { grade='C+'; gradeColor='var(--orange)'; }
  else if (pct >= 40) { grade='C'; gradeColor='var(--orange)'; }
  else if (pct >= 30) { grade='D'; gradeColor='var(--red)'; }
  else { grade='F'; gradeColor='var(--red)'; }

  return { categories, totalScore, totalMax, pct, grade, gradeColor };
}

function renderDetail(call) {
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('empty');

  const lines = parseTranscript(call.transcript);
  const analysis = analyzeCall(call);

  const transcriptHTML = lines.map(l => `
    <div class="transcript-line">
      <div class="speaker ${l.speaker.toLowerCase()}">${l.speaker}</div>
      <div class="text">${l.text}</div>
    </div>
  `).join('');

  const circumference = 2 * Math.PI * 42;
  const offset = circumference - (analysis.pct / 100) * circumference;

  function catGrade(pct) {
    if (pct >= 90) return {g:'A',c:'var(--green)'};
    if (pct >= 70) return {g:'B',c:'var(--green)'};
    if (pct >= 50) return {g:'C',c:'var(--yellow)'};
    if (pct >= 30) return {g:'D',c:'var(--orange)'};
    return {g:'F',c:'var(--red)'};
  }

  const summaryHTML = analysis.categories.map(cat => {
    const catPct = cat.max > 0 ? Math.round((cat.score/cat.max)*100) : 0;
    const {g,c} = catGrade(catPct);
    return `
      <div class="summary-row">
        <div class="cat-grade" style="color:${c}">${g}</div>
        <div class="cat-name">${cat.name}</div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${catPct}%;background:${c}"></div></div>
        <div class="cat-score" style="color:${c}">${cat.score}/${cat.max}</div>
      </div>`;
  }).join('');

  const detailedHTML = analysis.categories.map(cat => {
    const catPct = cat.max > 0 ? Math.round((cat.score/cat.max)*100) : 0;
    let pillColor = catPct >= 70 ? 'var(--green)' : catPct >= 40 ? 'var(--yellow)' : 'var(--red)';
    return `
      <div class="analysis-section">
        <h3>${cat.name} <span class="score-pill" style="background:${pillColor}22;color:${pillColor}">${cat.score}/${cat.max}</span></h3>
        ${cat.good.map(g => `<div class="feedback-item positive">+ ${g}</div>`).join('')}
        ${cat.bad.map(b => `<div class="feedback-item negative">- ${b}</div>`).join('')}
      </div>
    `;
  }).join('');

  panel.innerHTML = `
    <div class="transcript-panel">
      <div class="detail-header">
        <h2>Transcript</h2>
        <div class="detail-meta">
          <span>${call.customer_name || 'Unknown'}</span>
          <span>${formatPhone(call.customer_phone)}</span>
          <span>${call.customer_city ? call.customer_city + ', ' + call.customer_state : ''}</span>
          <span>${formatDate(call.start_time)}</span>
          <span>${formatDuration(call.duration)}</span>
        </div>
      </div>
      ${call.call_summary ? `<div class="summary-box"><strong>Summary:</strong> ${call.call_summary}</div>` : ''}
      ${transcriptHTML}
    </div>
    <div class="analysis-panel">
      <div class="detail-header">
        <h2>Call Coaching & Grade</h2>
      </div>
      <div class="grade-ring">
        <svg width="100" height="100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="var(--border)" stroke-width="6"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="${analysis.gradeColor}" stroke-width="6"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
        </svg>
        <div class="grade-label" style="color:${analysis.gradeColor}">${analysis.grade}</div>
        <div class="grade-score">${analysis.totalScore}/${analysis.totalMax} (${analysis.pct}%)</div>
      </div>
      <div class="analysis-tabs">
        <button class="analysis-tab active" data-tab="summary">Summary</button>
        <button class="analysis-tab" data-tab="detailed">Detailed</button>
      </div>
      <div class="tab-content active" id="tab-summary">
        <div class="summary-grid">${summaryHTML}</div>
      </div>
      <div class="tab-content" id="tab-detailed">
        ${detailedHTML}
      </div>
    </div>
  `;
  panel.querySelectorAll('.analysis-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      panel.querySelectorAll('.analysis-tab').forEach(t => t.classList.remove('active'));
      panel.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      panel.querySelector('#tab-' + tab.dataset.tab).classList.add('active');
    });
  });
}

init();
</script>
