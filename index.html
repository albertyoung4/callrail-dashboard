<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebuilt — Call Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3345;
    --text: #e4e6ed;
    --text2: #8b90a0;
    --accent: #4f8cff;
    --accent2: #3b6fcc;
    --green: #34d399;
    --yellow: #fbbf24;
    --orange: #f97316;
    --red: #ef4444;
    --purple: #a78bfa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; font-size:14px; }

  /* Header */
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:0; position:sticky; top:0; z-index:100; }
  .header-top { display:flex; align-items:center; gap:16px; padding:12px 24px; }
  .header h1 { font-size:18px; font-weight:700; white-space:nowrap; cursor:pointer; }
  .header h1 span { color:var(--accent); }
  .search-box { flex:1; max-width:500px; position:relative; }
  .search-box input { width:100%; padding:10px 14px 10px 38px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border-color .2s; }
  .search-box input:focus { border-color:var(--accent); }
  .search-box svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text2); }
  .stats { color:var(--text2); font-size:13px; white-space:nowrap; }
  .stats b { color:var(--text); }
  .header-nav { display:flex; align-items:center; gap:0; padding:0 24px; border-top:1px solid var(--border); }
  .header-nav .nav-btn { padding:10px 20px; font-size:13px; font-weight:700; cursor:pointer; border:none; background:none; color:var(--text2); border-bottom:3px solid transparent; transition:all .15s; text-transform:uppercase; letter-spacing:.5px; }
  .header-nav .nav-btn:hover { color:var(--text); }
  .header-nav .nav-btn.active-acq { color:var(--accent); border-bottom-color:var(--accent); }
  .header-nav .nav-btn.active-dispo { color:var(--purple); border-bottom-color:var(--purple); }
  .header-nav .nav-btn.home-active { color:var(--text); border-bottom-color:var(--text); }
  .header-nav .nav-sep { width:1px; height:20px; background:var(--border); margin:0 8px; }
  .header-nav .nav-filters { display:flex; align-items:center; gap:6px; margin-left:auto; }
  .header-nav .nav-filters .filter-label { font-size:10px; }
  .header-nav .nav-toggle { font-size:11px; color:var(--text2); cursor:pointer; display:flex; align-items:center; gap:4px; }
  .header-nav .nav-toggle input { cursor:pointer; }
  .filter-bar { display:flex; align-items:center; gap:8px; padding:10px 18px; border-bottom:1px solid var(--border); background:var(--surface); flex-wrap:wrap; }
  .filter-btn { padding:5px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text2); cursor:pointer; font-size:12px; transition:all .15s; }
  .filter-btn:hover { border-color:var(--accent); color:var(--text); }
  .filter-btn.active { background:var(--accent2); border-color:var(--accent); color:#fff; }
  .filter-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .filter-sep { width:1px; height:20px; background:var(--border); margin:0 4px; }
  .call-item .agent-name { color:var(--purple); font-size:12px; font-weight:500; }
  .call-item .source-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:600; margin-left:4px; vertical-align:middle; }
  .call-item .source-badge.callrail { background:rgba(79,140,255,.15); color:var(--accent); }
  .call-item .source-badge.zoom { background:rgba(167,139,250,.15); color:var(--purple); }

  /* Landing page */
  .landing { padding:32px; overflow-y:auto; flex:1; }
  .landing-header { margin-bottom:28px; }
  .landing-header h2 { font-size:22px; font-weight:700; margin-bottom:4px; }
  .landing-header p { color:var(--text2); font-size:14px; }
  .stat-cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:16px; margin-bottom:28px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px; }
  .stat-card .stat-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .stat-card .stat-value { font-size:28px; font-weight:800; }
  .stat-card .stat-sub { font-size:12px; color:var(--text2); margin-top:4px; }
  .dept-cards { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:28px; }
  .dept-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; cursor:pointer; transition:all .2s; }
  .dept-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 20px rgba(0,0,0,.3); }
  .dept-card.acq { border-left:4px solid var(--accent); }
  .dept-card.dispo { border-left:4px solid var(--purple); }
  .dept-card h3 { font-size:18px; font-weight:700; margin-bottom:8px; }
  .dept-card.acq h3 { color:var(--accent); }
  .dept-card.dispo h3 { color:var(--purple); }
  .dept-card .dept-stats { display:flex; gap:20px; margin-bottom:12px; }
  .dept-card .dept-stat { text-align:center; }
  .dept-card .dept-stat .ds-val { font-size:24px; font-weight:800; }
  .dept-card .dept-stat .ds-label { font-size:11px; color:var(--text2); text-transform:uppercase; }
  .dept-card .top-reps { margin-top:12px; }
  .dept-card .top-rep { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13px; }
  .dept-card .top-rep .rank { color:var(--text2); font-size:11px; min-width:18px; }
  .dept-card .top-rep .rep-n { flex:1; font-weight:500; }
  .dept-card .top-rep .rep-c { color:var(--text2); font-size:12px; }
  .recent-section { margin-bottom:28px; }
  .recent-section h3 { font-size:15px; font-weight:600; margin-bottom:12px; color:var(--text2); }
  .recent-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:12px; }
  .recent-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:14px; cursor:pointer; transition:background .15s; }
  .recent-card:hover { background:var(--surface2); }
  .recent-card .rc-top { display:flex; justify-content:space-between; margin-bottom:6px; }
  .recent-card .rc-name { font-weight:600; font-size:14px; }
  .recent-card .rc-dur { color:var(--green); font-size:13px; }
  .recent-card .rc-meta { color:var(--text2); font-size:12px; }

  /* Department tabs */
  .dept-tabs { display:flex; border-bottom:1px solid var(--border); background:var(--surface); }
  .dept-tab { flex:1; padding:14px 16px; text-align:center; font-size:14px; font-weight:700; cursor:pointer; border:none; background:none; color:var(--text2); border-bottom:3px solid transparent; transition:all .15s; text-transform:uppercase; letter-spacing:1px; }
  .dept-tab:hover { color:var(--text); background:var(--surface2); }
  .dept-tab.active.acq { color:var(--accent); border-bottom-color:var(--accent); }
  .dept-tab.active.dispo { color:var(--purple); border-bottom-color:var(--purple); }

  /* Breadcrumb / back nav */
  .breadcrumb { display:flex; align-items:center; gap:8px; padding:10px 18px; border-bottom:1px solid var(--border); background:var(--surface); font-size:13px; }
  .breadcrumb .back-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:13px; display:flex; align-items:center; gap:4px; padding:4px 8px; border-radius:4px; }
  .breadcrumb .back-btn:hover { background:var(--surface2); }
  .breadcrumb .crumb { color:var(--text2); }
  .breadcrumb .crumb-current { color:var(--text); font-weight:600; }

  /* Rep list */
  .rep-list { flex:1; overflow-y:auto; }
  .rep-item { padding:14px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; display:flex; align-items:center; gap:12px; }
  .rep-item:hover { background:var(--surface2); }
  .rep-item.active { background:var(--surface2); }
  .rep-item.active.acq { border-left:3px solid var(--accent); }
  .rep-item.active.dispo { border-left:3px solid var(--purple); }
  .rep-item .rep-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
  .rep-item.acq .rep-avatar { background:rgba(79,140,255,.15); color:var(--accent); }
  .rep-item.dispo .rep-avatar { background:rgba(167,139,250,.15); color:var(--purple); }
  .rep-item .rep-info { flex:1; min-width:0; }
  .rep-item .rep-name { font-weight:600; font-size:14px; }
  .rep-item .rep-meta { color:var(--text2); font-size:12px; margin-top:2px; display:flex; gap:12px; }
  .rep-item .rep-calls { font-size:13px; font-weight:700; color:var(--text2); white-space:nowrap; }
  .rep-item .rep-avg-grade { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; margin-left:8px; }

  /* Main layout — 3 columns: Reps | Calls | Detail */
  .container { display:flex; height:calc(100vh - 90px); min-height:0; }
  .container.landing-mode { display:block; overflow-y:auto; }
  .reps-panel { width:240px; min-width:200px; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .calls-panel { width:360px; min-width:280px; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .detail-panel { flex:1; display:flex; overflow:hidden; min-height:0; }
  .detail-panel.empty { align-items:center; justify-content:center; }
  .empty-state { text-align:center; color:var(--text2); }
  .empty-state svg { margin-bottom:12px; opacity:.4; }
  .empty-state p { font-size:15px; }
  .panel-header { padding:10px 14px; border-bottom:1px solid var(--border); background:var(--surface); font-size:12px; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:.5px; display:flex; align-items:center; justify-content:space-between; }

  /* Call list */
  .call-list { flex:1; overflow-y:auto; }
  .call-item { padding:14px 18px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; }
  .call-item:hover { background:var(--surface2); }
  .call-item.active { background:var(--surface2); border-left:3px solid var(--accent); padding-left:15px; }
  .call-item .name { font-weight:600; font-size:14px; margin-bottom:2px; }
  .call-item .phone { color:var(--accent); font-size:13px; font-family:'SF Mono',Monaco,monospace; }
  .call-item .meta { display:flex; gap:12px; margin-top:6px; color:var(--text2); font-size:12px; }
  .call-item .meta .duration { color:var(--green); }
  .call-item .meta .source { max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .call-item .lead-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; font-weight:600; margin-left:8px; }
  .call-item .outcome-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; margin-top:6px; }

  /* Pagination */
  .pagination { display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; border-top:1px solid var(--border); background:var(--surface); }
  .pagination button { padding:6px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); cursor:pointer; font-size:13px; }
  .pagination button:hover:not(:disabled) { background:var(--accent2); border-color:var(--accent); }
  .pagination button:disabled { opacity:.3; cursor:default; }
  .pagination span { color:var(--text2); font-size:13px; }

  /* Detail panels */
  .transcript-panel, .analysis-panel { flex:1; overflow-y:auto; padding:24px; min-height:0; height:100%; }
  .transcript-panel { border-right:1px solid var(--border); }

  .detail-header { margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .detail-header h2 { font-size:18px; margin-bottom:4px; }
  .detail-header .detail-meta { display:flex; flex-wrap:wrap; gap:16px; color:var(--text2); font-size:13px; margin-top:8px; }
  .detail-header .detail-meta span { display:flex; align-items:center; gap:4px; }

  /* Transcript */
  .transcript-line { margin-bottom:12px; line-height:1.6; }
  .transcript-line .speaker { font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
  .transcript-line .speaker.agent { color:var(--accent); }
  .transcript-line .speaker.caller { color:var(--green); }
  .transcript-line .text { color:var(--text); padding-left:12px; border-left:2px solid var(--border); }

  /* Analysis */
  .grade-ring { width:100px; height:100px; margin:0 auto 20px; position:relative; }
  .grade-ring svg { transform:rotate(-90deg); }
  .grade-ring .grade-label { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:32px; font-weight:800; }
  .grade-ring .grade-score { position:absolute; bottom:-4px; left:50%; transform:translateX(-50%); font-size:12px; color:var(--text2); }

  .analysis-section { margin-bottom:20px; }
  .analysis-section h3 { font-size:14px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .analysis-section h3 .score-pill { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }

  .feedback-item { padding:8px 12px; margin-bottom:6px; border-radius:6px; font-size:13px; line-height:1.5; }
  .feedback-item.positive { background:rgba(52,211,153,.08); border-left:3px solid var(--green); color:var(--green); }
  .feedback-item.negative { background:rgba(239,68,68,.08); border-left:3px solid var(--red); color:var(--red); }
  .feedback-item.warning { background:rgba(251,191,36,.08); border-left:3px solid var(--yellow); color:var(--yellow); }

  .analysis-tabs { display:flex; gap:0; margin-bottom:16px; border-bottom:2px solid var(--border); }
  .analysis-tab { padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; border:none; background:none; color:var(--text2); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; }
  .analysis-tab:hover { color:var(--text); }
  .analysis-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  .summary-grid { display:flex; flex-direction:column; gap:10px; }
  .summary-row { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:8px; background:var(--surface2); }
  .summary-row .cat-name { flex:1; font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .summary-row .cat-bar-wrap { flex:0 0 100px; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
  .summary-row .cat-bar { height:100%; border-radius:4px; transition:width .3s; }
  .summary-row .cat-score { font-size:12px; font-weight:700; min-width:44px; text-align:right; }
  .summary-row .cat-grade { font-size:13px; font-weight:800; min-width:24px; text-align:center; }

  .summary-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:14px; margin-bottom:20px; font-size:13px; line-height:1.6; color:var(--text2); }

  /* Scrollbar */
  * { scrollbar-width:thin; scrollbar-color:var(--text2) transparent; }
  ::-webkit-scrollbar { width:8px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--text2); border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--accent); }

  /* Loading */
  .loading { display:flex; align-items:center; justify-content:center; height:100%; color:var(--text2); }
  .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; margin-right:12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media (max-width:900px) {
    .list-panel { width:100%; }
    .container { flex-direction:column; }
    .detail-panel { flex-direction:column; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1 onclick="showLanding()">Rebuilt <span>Call Dashboard</span></h1>
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search name, phone, address, or rep...">
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="header-nav" id="headerNav">
    <button class="nav-btn home-active" data-nav="home" onclick="showLanding()">Home</button>
    <button class="nav-btn" data-nav="acquisition" onclick="enterDepartment('acquisition')">Acquisition</button>
    <button class="nav-btn" data-nav="disposition" onclick="enterDepartment('disposition')">Disposition</button>
    <div class="nav-filters" id="navFilters" style="display:none;">
      <div class="nav-sep"></div>
      <span class="filter-label">Duration:</span>
      <button class="filter-btn active" data-min="0" onclick="setDurationFilter(0)">All</button>
      <button class="filter-btn" data-min="120" onclick="setDurationFilter(120)">2m+</button>
      <button class="filter-btn" data-min="300" onclick="setDurationFilter(300)">5m+</button>
      <button class="filter-btn" data-min="600" onclick="setDurationFilter(600)">10m+</button>
      <div class="nav-sep"></div>
      <label class="nav-toggle" id="internalToggle" style="display:none;">
        <input type="checkbox" onchange="toggleInternal(this.checked)"> Show internal
      </label>
    </div>
  </div>
</div>

<div class="container" id="mainContainer">
  <!-- Landing page (shown by default) -->
  <div id="landingPage" class="landing" style="flex:1;">
    <div class="loading"><div class="spinner"></div>Loading calls...</div>
  </div>

  <!-- 3-column drill view (hidden until dept selected) -->
  <div class="reps-panel" id="repsPanel" style="display:none;">
    <div class="panel-header"><span>Reps</span><span id="repCount"></span></div>
    <div class="rep-list" id="repList"></div>
  </div>
  <div class="calls-panel" id="callsPanel" style="display:none;">
    <div class="panel-header">
      <span id="callsPanelTitle">Calls</span>
      <span id="callsCount"></span>
    </div>
    <div id="subFilters" class="filter-bar" style="display:none;"></div>
    <div class="call-list" id="callList"></div>
    <div class="pagination" id="pagination"></div>
  </div>
  <div class="detail-panel empty" id="detailPanel">
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15.05 5A5 5 0 0119 8.95M15.05 1A9 9 0 0123 8.94M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      <p>Select a call to view transcript & analysis</p>
    </div>
  </div>
</div>

<script>
const PER_PAGE = 25;
let allCalls = [];
let filteredCalls = [];
let currentPage = 1;
let selectedCallId = null;
let minDuration = 0;

// Drill-down state
let department = 'acquisition'; // 'acquisition' or 'disposition'
let selectedRep = null;         // null = show rep list, string = show that rep's calls
let callTypeFilter = 'all';
let showInternal = false;  // exclude intra-company calls by default

function extractAgentName(call) {
  if (call.agent_name) return call.agent_name;
  if (!call.transcript) return '';
  const m = call.transcript.match(/(?:this is|my name is|i'm|i am)\s+([A-Z][a-z]+)/i);
  if (m && !['Business','Thank','This','Your','An','Correct','Sure','Great','Well','Just','Ready','About','Here','There','Actually'].includes(m[1])) return m[1];
  return '';
}

// Classify a call as acquisition or disposition using DB user roles ONLY
function classifyDepartment(call) {
  // Strict: use agent_department from DB user roles
  if (call.agent_department === 'acquisition') return 'acquisition';
  if (call.agent_department === 'disposition') return 'disposition';
  // If agent has a role but it's not acq/dispo (e.g. Transaction Coordinator), skip
  if (call.agent_role && !/acquisition|inside sales|disposition|associate sales/i.test(call.agent_role)) return 'other';
  // Fallback for calls without DB role match: use source system
  if (call.source_system === 'zoom_phone') return 'disposition';
  if (/transfer.*dispo|dispo.*agent/i.test(call.five9_disposition || '')) return 'disposition';
  return 'acquisition';
}

// Get call type label for sub-filtering
function getCallType(call) {
  if (call.source_system === 'zoom_phone') {
    const all = (call.transcript || '').toLowerCase();
    if (/appointment|set.*appt|virtual.*appointment|confirm.*appointment/.test(all)) return 'Appointment';
    if (/retrade|price.*adjust|renegotiat|revised.*offer/.test(all)) return 'Retrade';
    if (/flat fee|listing.*agreement|mls/.test(all)) return 'Flat Fee';
    if (/investor|portfolio|deal.*flow|wholesale|buyer.*list/.test(all)) {
      if (/cold|first.*time|introduction|nice to meet/.test(all)) return 'Investor Cold';
      return 'Investor Outreach';
    }
    if (/follow.*up|checking.*in|touch.*base|circle.*back/.test(all)) return 'Follow Up';
    if (/protected.*lead|hot.*lead|warm.*transfer/.test(all)) return 'Protected Lead';
    if (/sell|property|house|home|offer|mailer|deed|mortgage|closing/.test(all)) return 'Seller Call';
    return 'General';
  }
  // Acquisition call types
  const src = (call.source || '').toLowerCase();
  const five9 = (call.five9_disposition || '').toLowerCase();
  const dir = (call.direction || '').toLowerCase();
  if (/return call|contact center return/i.test(src)) return 'Return Call';
  if (dir === 'outbound' || /outbound/i.test(src)) return 'Outbound';
  if (/callback|call.?back/i.test(five9) || /callback/i.test(src)) return 'Callback';
  return 'New Inbound';
}

async function init() {
  try {
    const [crRes, zmRes] = await Promise.allSettled([
      fetch('calls.json').then(r => r.json()),
      fetch('zoom-calls.json').then(r => r.json())
    ]);

    let crCalls = [];
    if (crRes.status === 'fulfilled') {
      crCalls = (crRes.value.calls || []).map(c => ({
        ...c,
        source_system: c.source_system || 'callrail',
        agent_name: extractAgentName(c)
      }));
    }

    let zmCalls = [];
    if (zmRes.status === 'fulfilled') {
      zmCalls = (zmRes.value.calls || []).map(c => ({
        ...c,
        source_system: 'zoom_phone',
        agent_name: c.agent_name || ''
      }));
    }

    allCalls = [...crCalls, ...zmCalls].sort((a,b) => new Date(b.start_time) - new Date(a.start_time));

    // Build set of known agent names for internal call detection + name merging
    const agentNames = new Set();
    const fullAgentNames = {};  // first name → full name mapping
    allCalls.forEach(c => {
      if (c.agent_name) {
        agentNames.add(c.agent_name.toLowerCase());
        // Track full names (has space = full name)
        if (c.agent_name.includes(' ')) {
          const first = c.agent_name.split(' ')[0].toLowerCase();
          if (!fullAgentNames[first]) fullAgentNames[first] = {};
          fullAgentNames[first][c.agent_name] = (fullAgentNames[first][c.agent_name] || 0) + 1;
        }
      }
    });
    // Merge first-name-only agent names to their most common full name
    allCalls.forEach(c => {
      if (c.agent_name && !c.agent_name.includes(' ')) {
        const first = c.agent_name.toLowerCase();
        const matches = fullAgentNames[first];
        if (matches) {
          // Pick the full name with the most occurrences
          const best = Object.entries(matches).sort((a,b) => b[1] - a[1])[0];
          if (best) c.agent_name = best[0];
        }
      }
    });

    // Tag each call with department, call type, and internal flag
    allCalls.forEach(c => {
      c._dept = classifyDepartment(c);
      c._callType = getCallType(c);
      // Internal: use DB flag (number_type=1 both sides), or fallback to name matching
      const custName = (c.customer_name || '').toLowerCase();
      c._internal = c.internal === true || (c.source_system === 'zoom_phone' && custName && agentNames.has(custName));
    });

    console.log(`Loaded ${crCalls.length} CallRail + ${zmCalls.length} Zoom Phone = ${allCalls.length} total calls`);
    renderLanding();
  } catch (e) {
    document.getElementById('repList').innerHTML = '<div class="loading" style="color:var(--red)">Failed to load call data</div>';
  }
}

    const map = {};

  const dispoTopReps = topReps(dispoCalls, 5);

  const dispoReps = new Set(dispoCalls.map(c => c.agent_name || 'Unknown'));

  // Avg duration
  const avgAcqDur = acqCalls.length ? Math.round(acqCalls.reduce((s,c) => s + c.duration, 0) / acqCalls.length) : 0;
  const avgDispoDur = dispoCalls.length ? Math.round(dispoCalls.reduce((s,c) => s + c.duration, 0) / dispoCalls.length) : 0;

  // Recent notable calls (long calls from today/yesterday)
  const recentNotable = [...acqCalls, ...dispoCalls]
    .filter(c => c.duration > 300)
    .sort((a,b) => new Date(b.start_time) - new Date(a.start_time))
    .slice(0, 6);

    </div>

        <div class="stat-value">${todayAcq.length + todayDispo.length}</div>
        <div class="stat-sub">${todayAcq.length} acq / ${todayDispo.length} dispo</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Week</div>
        <div class="stat-value">${weekAcq.length + weekDispo.length}</div>
        <div class="stat-sub">${weekAcq.length} acq / ${weekDispo.length} dispo</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Duration</div>
        <div class="stat-value" style="font-size:22px;">${formatDuration(avgAcqDur)} / ${formatDuration(avgDispoDur)}</div>
        <div class="stat-sub">acq / dispo</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Reps</div>
        <div class="stat-value">${acqReps.size + dispoReps.size}</div>
        <div class="stat-sub">${acqReps.size} acq / ${dispoReps.size} dispo</div>
      </div>
    </div>

    <div class="dept-cards">
      <div class="dept-card acq" onclick="enterDepartment('acquisition')">
        <h3>Acquisition</h3>
        <div class="dept-stats">
          <div class="dept-stat"><div class="ds-val">${acqReps.size}</div><div class="ds-label">Reps</div></div>
          <div class="dept-stat"><div class="ds-val">${acqCalls.length}</div><div class="ds-label">Calls</div></div>
          <div class="dept-stat"><div class="ds-val">${formatDuration(avgAcqDur)}</div><div class="ds-label">Avg</div></div>
        </div>
        <div class="top-reps">
          ${acqTopReps.map(([name, count], i) => `
            <div class="top-rep"><span class="rank">${i+1}.</span><span class="rep-n">${name}</span><span class="rep-c">${count} calls</span></div>
          `).join('')}
        </div>
      </div>
      <div class="dept-card dispo" onclick="enterDepartment('disposition')">
        <h3>Disposition</h3>
        <div class="dept-stats">
          <div class="dept-stat"><div class="ds-val">${dispoReps.size}</div><div class="ds-label">Reps</div></div>
          <div class="dept-stat"><div class="ds-val">${dispoCalls.length}</div><div class="ds-label">Calls</div></div>
          <div class="dept-stat"><div class="ds-val">${formatDuration(avgDispoDur)}</div><div class="ds-label">Avg</div></div>
        </div>
        <div class="top-reps">
          ${dispoTopReps.map(([name, count], i) => `
            <div class="top-rep"><span class="rank">${i+1}.</span><span class="rep-n">${name}</span><span class="rep-c">${count} calls</span></div>
          `).join('')}

                <span class="rc-dur">${formatDuration(c.duration)}</span>
